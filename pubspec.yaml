name: bhojn_app
description: "A new Flutter project."
publish_to: 'none'

version: 11.8.0+21

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  cupertino_icons: ^1.0.8
  lottie: ^3.3.2
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  mobile_scanner: ^7.2.0
  qr_flutter: ^4.1.0
  geolocator: ^14.0.2
  intl: ^0.20.2
  url_launcher: ^6.3.2
  firebase_messaging: 16.1.3
  flutter_local_notifications: ^21.0.0
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  gal: ^2.3.2
  cloud_functions: ^6.1.0
  image_picker: ^1.2.1
  firebase_storage: ^13.1.0
  firebase_app_check: ^0.4.2
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_logo.png"
  min_sdk_android: 21
  # 👇 Ye 2 lines Android padding ka dushman hain
  adaptive_icon_background: "#161B26" # Ye tere logo ka dark blue background color code hai
  adaptive_icon_foreground: "assets/icon/app_logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/Thank you with confetti.json
    - assets/animations/Couple eating.json